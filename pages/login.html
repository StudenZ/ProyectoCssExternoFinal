<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkKitchen | Iniciar Sesión</title>
</head>

<body
    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh;">

    <header
        style="background-color: #1e1e1e; padding: 15px 30px; border-bottom: 3px solid #ff6200; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 24px; font-weight: bold; color: #ff6200;">DarkKitchen 🍔</div>
        <nav>
            <ul style="list-style-type: none; margin: 0; padding: 0;">
                <li style="display: inline; margin-left: 20px;"><a href="../index.html"
                        style="color: #ffffff; text-decoration: none; font-size: 16px;">Inicio</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="nosotros.html"
                        style="color: #ffffff; text-decoration: none; font-size: 16px;">Nosotros</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="menu.html"
                        style="color: #ffffff; text-decoration: none; font-size: 16px;">Menú</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="contacto.html"
                        style="color: #ffffff; text-decoration: none; font-size: 16px;">Pedir Ahora</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="login.html"
                        style="color: #ff6200; font-weight: bold; border: 1px solid #ff6200; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 16px;">Iniciar
                        Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 40px; flex-grow: 1; display: flex; justify-content: center; align-items: center;">
        <section
            style="background-color: #1e1e1e; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-top: 3px solid #ff6200;">
            <h2 style="text-align: center; color: #ff6200; margin-top: 0; margin-bottom: 30px;">Acceso a tu Cuenta</h2>
            <form action="contacto.html" method="GET">
                <div style="margin-bottom: 20px;">
                    <label for="email"
                        style="display: block; margin-bottom: 8px; font-weight: bold; color: #cccccc;">Correo
                        Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required
                        style="width: 100%; padding: 12px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="password"
                        style="display: block; margin-bottom: 8px; font-weight: bold; color: #cccccc;">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña secreta" required
                        style="width: 100%; padding: 12px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 25px; display: flex; align-items: center;">
                    <input type="checkbox" id="recordar" name="recordar" style="margin-right: 8px; accent-color: #ff6200; width: 16px; height: 16px; cursor: pointer;">
                    <label for="recordar" style="color: #cccccc; cursor: pointer; font-size: 0.95em;">Recordar mi sesión</label>
                </div>
                <button type="submit"
                    style="width: 100%; background-color: #ff6200; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">Entrar
                    a Pedir</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #888;">
                ¿No tienes cuenta? <a href="#" style="color: #ff6200; text-decoration: none;">Regístrate</a>
            </p>
        </section>
    </main>

    <footer style="background-color: #1e1e1e; text-align: center; padding: 20px; border-top: 1px solid #333;">
        <p style="margin: 0;">&copy; 2026 DarkKitchen. Todos los derechos reservados.</p>
    </footer>

</body>

</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkKitchen | Iniciar Sesión</title>
    <link rel="icon" href="../img/icon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/general.css" />
  </head>

  <body>
    <header>
      <a href="../index.html" class="logo" title="Logo de DarkKitchen">DarkKitchen <span>🍔</span></a>
      <nav>
        <ul>
          <li>
            <a href="../index.html" title="Ir a la página de inicio">
              <i class="fa-solid fa-house"></i>Inicio</a
            >
          </li>
          <li>
            <a href="nosotros.html" title="Conocer más sobre DarkKitchen">
              <i class="fa-regular fa-id-badge"></i>Nosotros</a
            >
          </li>
          <li>
            <a href="servicios.html" title="Ver el menú de hamburguesas">
              <i class="fa-solid fa-bowl-food"></i>Servicios</a
            >
          </li>
          <li>
            <a href="galeria.html" title="Ver galería y promociones de DarkKitchen">
              <i class="fa-solid fa-tags"></i>Galería</a
            >
          </li>
          <li>
            <a href="buscar.html" title="Buscar y filtrar hamburguesas">
              <i class="fa-solid fa-magnifying-glass"></i>Buscar</a
            >
          </li>
          <li>
            <a href="contacto.html" title="Hacer un pedido">
              <i class="fa-solid fa-boxes-packing"></i>Pedir Ahora</a
            >
          </li>
          <li>
            <a href="login.html" class="active" title="Iniciar sesión en tu cuenta">
              <i class="fa-solid fa-user"></i>Iniciar Sesión</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="login-acceso" title="Formulario de inicio de sesión">
        <h2>Acceso a tu Cuenta</h2>
        <form class="formulario-acceso" action="../index.html" method="post">
          <div class="campo-grupo">
            <label for="email">Correo Electrónico:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="ejemplo@correo.com"
              title="Escribe tu correo electrónico"
              required
            />
          </div>
          <div class="campo-grupo">
            <label for="password">Contraseña:</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Tu contraseña secreta"
              title="Escribe tu contraseña"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="recordar" style="display: flex; align-items: center; cursor: pointer; gap: 8px;">
              <input
                type="checkbox"
                id="recordar"
                name="recordar"
                title="Mantener tu sesión recordada"
              />
              Recordar mi sesión
            </label>
          </div>
          <button class="btn-primary" type="submit" title="Entrar a tu cuenta para realizar pedidos">
            Entrar a Pedir
          </button>
        </form>
        <p>
          ¿No tienes cuenta?
          <a href="registro.html" title="Crear una cuenta nueva">Regístrate</a>
        </p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 DarkKitchen. Todos los derechos reservados.</p>
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="contacto.html" title="Pedir ahora"><i class="fa-solid fa-cart-shopping"></i></a>
      </div>
    </footer>
  </body>
</html>

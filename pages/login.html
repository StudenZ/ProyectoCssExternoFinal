<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkKitchen | Iniciar Sesión</title>
    <link rel="icon" href="../img/icon.ico" />
    <link rel="stylesheet" href="../css/general.css" />
  </head>

  <body>
    <header>
      <div title="Logo de DarkKitchen">DarkKitchen</div>
      <nav>
        <ul>
          <li>
            <a href="../index.html" title="Ir a la página de inicio">Inicio</a>
          </li>
          <li>
            <a href="nosotros.html" title="Conocer más sobre DarkKitchen"
              >Nosotros</a
            >
          </li>
          <li>
            <a href="menu.html" title="Ver el menú de hamburguesas">Menú</a>
          </li>
          <li>
            <a href="promociones.html" title="Ver promociones de DarkKitchen"
              >Promociones</a
            >
          </li>
          <li>
            <a href="contacto.html" title="Hacer un pedido">Pedir Ahora</a>
          </li>
          <li>
            <a href="login.html" title="Iniciar sesión en tu cuenta"
              >Iniciar Sesión</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section title="Formulario de inicio de sesión">
        <h2>Acceso a tu Cuenta</h2>
        <form action="../index.html" method="post">
          <div>
            <label for="email">Correo Electrónico:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="ejemplo@correo.com"
              title="Escribe tu correo electrónico"
              required
            />
          </div>
          <div>
            <label for="password">Contraseña:</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Tu contraseña secreta"
              title="Escribe tu contraseña"
              required
            />
          </div>

          <div>
            <label for="recordar"
              ><input
                type="checkbox"
                id="recordar"
                name="recordar"
                title="Mantener tu sesión recordada"
              />
              Recordar mi sesión</label
            >
          </div>
          <button
            type="submit"
            title="Entrar a tu cuenta para realizar pedidos"
          >
            Entrar a Pedir
          </button>
        </form>
        <p>
          ¿No tienes cuenta?
          <a href="registro.html" title="Crear una cuenta nueva">Regístrate</a>
        </p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 DarkKitchen. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>

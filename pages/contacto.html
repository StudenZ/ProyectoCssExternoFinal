    <meta charset="UTF-8" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/contacto.css" />
  </head>

      <a href="../index.html" class="logo" title="Logo de DarkKitchen">DarkKitchen <span>🍔</span></a>
      <nav>
        <ul>
          <li>
            <a href="../index.html" title="Ir a la página de inicio">
              <i class="fa-solid fa-house"></i>Inicio</a
            >
          </li>
          <li>
            <a href="nosotros.html" title="Conocer más sobre DarkKitchen">
              <i class="fa-regular fa-id-badge"></i>Nosotros</a
            >
          </li>
          <li>
            <a href="servicios.html" title="Ver el menú de hamburguesas">
              <i class="fa-solid fa-bowl-food"></i>Servicios</a
            >
          </li>
          <li>
            <a href="galeria.html" title="Ver galería y promociones de DarkKitchen">
              <i class="fa-solid fa-tags"></i>Galería</a
            >
          </li>
          <li>
            <a href="buscar.html" title="Buscar y filtrar hamburguesas">
              <i class="fa-solid fa-magnifying-glass"></i>Buscar</a
            >
          </li>
          <li>
            <a href="contacto.html" class="active" title="Completar el formulario de pedido">
              <i class="fa-solid fa-boxes-packing"></i>Pedir Ahora</a
            >
          </li>
          <li>
            <a href="login.html" title="Iniciar sesión en tu cuenta">
              <i class="fa-solid fa-user"></i>Iniciar Sesión</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="seccion-pedido" title="Formulario para hacer un pedido en DarkKitchen">
        <h2>Completa tu Pedido</h2>
        <form class="formulario-contacto" action="#" method="POST">
          <fieldset>
            <legend>Datos de Contacto</legend>

            <div class="form-fila">
              <div class="form-col">
                <label for="nombre">Nombre Completo:</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Juan Pérez"
                  title="Escribe tu nombre completo"
                  required
                />
              </div>

              <div class="form-col">
                <label for="telefono">Teléfono de Contacto:</label>
                <input
                  type="tel"
                  id="telefono"
                  name="telefono"
                  placeholder="555-1234-567"
                  title="Escribe tu número de teléfono"
                  required
                />
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Detalles del Pedido</legend>

            <div class="form-fila">
              <div class="form-col">
                <label for="platillo">Selecciona tu Hamburguesa:</label>
                <select
                  id="platillo"
                  name="platillo"
                  title="Selecciona la hamburguesa que deseas pedir"
                  required
                >
                  <option value="" disabled selected>
                    -- Elige una opción --
                  </option>
                  <option value="classic">Classic Smash - $150.00</option>
                  <option value="bacon">Bacon BBQ - $180.00</option>
                  <option value="doble">Monster Double - $220.00</option>
                </select>
              </div>

              <div class="form-col">
                <label for="cantidad">Cantidad:</label>
                <input
                  type="number"
                  id="cantidad"
                  name="cantidad"
                  min="1"
                  max="10"
                  value="1"
                  title="Elige la cantidad de hamburguesas"
                  required
                />
              </div>
            </div>

            <div style="margin-bottom: 20px;">
              <label>Extras y Adicionales:</label>
              <div class="opciones-flex">
                <label class="opcion-item">
                  <input
                    type="checkbox"
                    name="extras"
                    value="queso"
                    title="Agregar extra queso al pedido"
                  />
                  Extra Queso
                </label>
                <label class="opcion-item">
                  <input
                    type="checkbox"
                    name="extras"
                    value="tocino"
                    title="Agregar tocino ahumado al pedido"
                  />
                  Tocino Ahumado
                </label>
                <label class="opcion-item">
                  <input
                    type="checkbox"
                    name="extras"
                    value="papas"
                    title="Agregar una porción de papas al pedido"
                  />
                  Porción de Papas
                </label>
              </div>
            </div>

            <div class="form-fila">
              <div class="form-col">
                <label>Tipo de Entrega:</label>
                <div class="opciones-flex">
                  <label class="opcion-item">
                    <input
                      type="radio"
                      name="entrega"
                      value="domicilio"
                      checked
                      title="Recibir el pedido a domicilio"
                    />
                    A Domicilio
                  </label>
                  <label class="opcion-item">
                    <input
                      type="radio"
                      name="entrega"
                      value="recoger"
                      title="Pasar a recoger el pedido"
                    />
                    Pasar a Recoger
                  </label>
                </div>
              </div>

              <div class="form-col">
                <label for="hora_entrega">Hora de Entrega (Opcional):</label>
                <input
                  type="time"
                  id="hora_entrega"
                  name="hora_entrega"
                  title="Selecciona una hora de entrega opcional"
                />
              </div>
            </div>

            <div style="margin-bottom: 20px;">
              <label for="instrucciones">Instrucciones Especiales (Opcional):</label>
              <textarea
                id="instrucciones"
                name="instrucciones"
                placeholder="Ej: Sin cebolla, extra aderezo..."
                title="Escribe instrucciones especiales para tu pedido"
              ></textarea>
            </div>

            <div>
              <label for="ubicacion">Ubicación de la Cocina:</label>
              <a
                id="ubicacion"
                href="https://maps.app.goo.gl/WB56JtZgSfAVFi3o9"
                target="_blank"
                title="Abrir ubicación de DarkKitchen en Google Maps"
                >Encuéntranos aquí <i class="fa-solid fa-arrow-up-right-from-square"></i></a
              >
              <div class="mapa-contenedor">
                <iframe
                  src="https://maps.google.com/maps?q=santo%20domingo%20ecuador&z=13&output=embed"
                  width="100%"
                  height="300"
                  title="Mapa de ubicación de DarkKitchen"
                  allowfullscreen
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </div>
          </fieldset>

          <button class="btn-enviar" type="submit" title="Confirmar y enviar el pedido">
            Confirmar Pedido
          </button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 DarkKitchen. Todos los derechos reservados.</p>

        <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="contacto.html" title="Pedir ahora"><i class="fa-solid fa-cart-shopping"></i></a>
      </div>
    </footer>
  </body>
</html>

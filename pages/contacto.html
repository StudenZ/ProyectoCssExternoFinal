<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkKitchen | Hacer Pedido</title>
    <link rel="icon" href="../img/icon.ico" />
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/contacto.css" />
  </head>
  <body>
    <header>
      <div
        title="Logo de DarkKitchen"
      >
        DarkKitchen 🍔
      </div>
      <nav>
        <ul>
          <li>
            <a
              href="../index.html"
              title="Ir a la página de inicio"
              >Inicio</a
            >
          </li>
          <li>
            <a
              href="nosotros.html"
              title="Conocer más sobre DarkKitchen"
              >Nosotros</a
            >
          </li>
          <li>
            <a
              href="menu.html"
              title="Ver el menú de hamburguesas"
              >Menú</a
            >
          </li>
          <li>
            <a
              href="promociones.html"
              title="Ver promociones de DarkKitchen"
              >Promociones</a
            >
          </li>
          <li>
            <a
              href="contacto.html"
              title="Completar el formulario de pedido"
              >Pedir Ahora</a
            >
          </li>
          <li>
            <a
              href="login.html"
              title="Iniciar sesión en tu cuenta"
              >Iniciar Sesión</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="seccion-pedido" title="Formulario para hacer un pedido en DarkKitchen">
        <h2>
          Completa tu Pedido
        </h2>
        <form class="formulario-contacto" action="#" method="POST">
          <fieldset>
            <legend>
              Datos de Contacto
            </legend>

            <div>
              <label
                for="nombre"
                >Nombre Completo:</label
              >
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Juan Pérez"
                title="Escribe tu nombre completo"
                required
              />
            </div>

            <div>
              <label
                for="telefono"
                >Teléfono de Contacto:</label
              >
              <input
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="555-1234-567"
                title="Escribe tu número de teléfono"
                required
              />
            </div>
          </fieldset>

          <fieldset>
            <legend>
              Detalles del Pedido
            </legend>

            <div>
              <div>
                <label
                  for="platillo"
                  >Selecciona tu Hamburguesa:</label
                >
                <select
                  id="platillo"
                  name="platillo"
                  title="Selecciona la hamburguesa que deseas pedir"
                  required
                >
                  <option value="" disabled selected>
                    -- Elige una opción --
                  </option>
                  <option value="classic">Classic Smash - $150.00</option>
                  <option value="bacon">Bacon BBQ - $180.00</option>
                  <option value="doble">Monster Double - $220.00</option>
                </select>
              </div>

              <div>
                <label
                  for="cantidad"
                  >Cantidad:</label
                >
                <input
                  type="number"
                  id="cantidad"
                  name="cantidad"
                  min="1"
                  max="10"
                  value="1"
                  title="Elige la cantidad de hamburguesas"
                  required
                />
              </div>
            </div>

            <div>
              <label>Extras y Adicionales:</label>
              <div>
                <label>
                  <input
                    type="checkbox"
                    name="extras"
                    value="queso"
                    title="Agregar extra queso al pedido"
                  />
                  Extra Queso
                </label>
                <label>
                  <input
                    type="checkbox"
                    name="extras"
                    value="tocino"
                    title="Agregar tocino ahumado al pedido"
                  />
                  Tocino Ahumado
                </label>
                <label>
                  <input
                    type="checkbox"
                    name="extras"
                    value="papas"
                    title="Agregar una porción de papas al pedido"
                  />
                  Porción de Papas
                </label>
              </div>
            </div>

            <div>
              <div>
                <label>Tipo de Entrega:</label>
                <div>
                  <label>
                    <input
                      type="radio"
                      name="entrega"
                      value="domicilio"
                      checked
                      title="Recibir el pedido a domicilio"
                    />
                    A Domicilio
                  </label>
                  <label>
                    <input
                      type="radio"
                      name="entrega"
                      value="recoger"
                      title="Pasar a recoger el pedido"
                    />
                    Pasar a Recoger
                  </label>
                </div>
              </div>

              <div>
                <label
                  for="hora_entrega"
                  >Hora de Entrega (Opcional):</label
                >
                <input
                  type="time"
                  id="hora_entrega"
                  name="hora_entrega"
                  title="Selecciona una hora de entrega opcional"
                />
              </div>
            </div>

            <div>
              <label
                for="instrucciones"
                >Instrucciones Especiales (Opcional):</label
              >
              <textarea
                id="instrucciones"
                name="instrucciones"
                rows="3"
                placeholder="Ej: Sin cebolla, extra aderezo..."
                title="Escribe instrucciones especiales para tu pedido"
              ></textarea>
            </div>

            <div></div>
            <div>
              <label
                for="ubicacion"
                >Ubicación:</label
              >
              <a
                id="ubicacion"
                href="https://maps.app.goo.gl/WB56JtZgSfAVFi3o9"
                target="_blank"
                title="Abrir ubicación de DarkKitchen en Google Maps"
                >Encuéntranos aquí</a
              >
              <br />
              <br />
              <div>
                <iframe
                  src="https://maps.google.com/maps?q=santo%20domingo%20ecuador&z=13&output=embed"
                  width="100%"
                  height="350"
                  title="Mapa de ubicación de DarkKitchen"
                  allowfullscreen
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </div>
          </fieldset>

          <button class="btn-enviar" type="submit" title="Confirmar y enviar el pedido">
            Confirmar Pedido
          </button>
        </form>
      </section>
    </main>

    <footer>
      <p>
        &copy; 2026 DarkKitchen. Proyecto Práctico de Formulario.
      </p>
    </footer>
  </body>
</html>

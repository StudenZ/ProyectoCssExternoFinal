<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkKitchen | Hacer Pedido</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 0;">

    <header style="background-color: #1e1e1e; padding: 15px 30px; border-bottom: 3px solid #ff6200; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 24px; font-weight: bold; color: #ff6200;">DarkKitchen 🍔</div>
        <nav>
            <ul style="list-style-type: none; margin: 0; padding: 0;">
                <li style="display: inline; margin-left: 20px;"><a href="../index.html" style="color: #ffffff; text-decoration: none; font-size: 16px;">Inicio</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="nosotros.html" style="color: #ffffff; text-decoration: none; font-size: 16px;">Nosotros</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="menu.html" style="color: #ffffff; text-decoration: none; font-size: 16px;">Menú</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="contacto.html" style="color: #ff6200; font-weight: bold; text-decoration: none; font-size: 16px;">Pedir Ahora</a></li>
                <li style="display: inline; margin-left: 20px;"><a href="login.html" style="color: #ffffff; border: 1px solid white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 16px;">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 40px; display: flex; justify-content: center;">
        <section style="background-color: #1e1e1e; padding: 40px; border-radius: 10px; width: 100%; max-width: 600px; border-top: 3px solid #ff6200;">
            <h2 style="color: #ff6200; margin-top: 0; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;">Completa tu Pedido</h2>
            <form action="#" method="POST">
                

                <fieldset style="border: 1px solid #333; border-radius: 5px; padding: 20px; margin-bottom: 30px;">
                    <legend style="color: #ff6200; font-weight: bold; padding: 0 10px; font-size: 1.1em;">Datos de Contacto</legend>

                    <div style="margin-bottom: 20px;">
                        <label for="nombre" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="telefono" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Teléfono de Contacto:</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="555-1234-567" required style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit;">
                    </div>
                </fieldset>


                <fieldset style="border: 1px solid #333; border-radius: 5px; padding: 20px; margin-bottom: 30px;">
                    <legend style="color: #ff6200; font-weight: bold; padding: 0 10px; font-size: 1.1em;">Detalles del Pedido</legend>

                    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                        <div style="flex: 2; min-width: 200px;">
                            <label for="platillo" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Selecciona tu Hamburguesa:</label>
                            <select id="platillo" name="platillo" required style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit;">
                                <option value="" disabled selected>-- Elige una opción --</option>
                                <option value="classic">Classic Smash - $150.00</option>
                                <option value="bacon">Bacon BBQ - $180.00</option>
                                <option value="doble">Monster Double - $220.00</option>
                            </select>
                        </div>
                        

                        <div style="flex: 1; min-width: 100px;">
                            <label for="cantidad" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Cantidad:</label>
                            <input type="number" id="cantidad" name="cantidad" min="1" max="10" value="1" required style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit;">
                        </div>
                    </div>


                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Extras y Adicionales:</label>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <label style="color: white; cursor: pointer; display: flex; align-items: center;">
                                <input type="checkbox" name="extras" value="queso" style="margin-right: 5px; accent-color: #ff6200; width: 16px; height: 16px;"> Extra Queso
                            </label>
                            <label style="color: white; cursor: pointer; display: flex; align-items: center;">
                                <input type="checkbox" name="extras" value="tocino" style="margin-right: 5px; accent-color: #ff6200; width: 16px; height: 16px;"> Tocino Ahumado
                            </label>
                            <label style="color: white; cursor: pointer; display: flex; align-items: center;">
                                <input type="checkbox" name="extras" value="papas" style="margin-right: 5px; accent-color: #ff6200; width: 16px; height: 16px;"> Porción de Papas
                            </label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Tipo de Entrega:</label>
                            <div style="display: flex; gap: 20px; margin-top: 10px;">
                                <label style="font-weight: normal; display: inline-flex; align-items: center; cursor: pointer; color: white;">
                                    <input type="radio" name="entrega" value="domicilio" checked style="margin-right: 8px; accent-color: #ff6200; width: 16px; height: 16px;"> A Domicilio
                                </label>
                                <label style="font-weight: normal; display: inline-flex; align-items: center; cursor: pointer; color: white;">
                                    <input type="radio" name="entrega" value="recoger" style="margin-right: 8px; accent-color: #ff6200; width: 16px; height: 16px;"> Pasar a Recoger
                                </label>
                            </div>
                        </div>
                        

                        <div style="flex: 1; min-width: 150px;">
                            <label for="hora_entrega" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Hora de Entrega (Opcional):</label>
                            <input type="time" id="hora_entrega" name="hora_entrega" style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit;">
                        </div>
                    </div>

                    <div style="margin-bottom: 10px;">
                        <label for="instrucciones" style="display: block; margin-bottom: 8px; font-weight: bold; color: #ccc;">Instrucciones Especiales (Opcional):</label>
                        <textarea id="instrucciones" name="instrucciones" rows="3" placeholder="Ej: Sin cebolla, extra aderezo..." style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; font-family: inherit; resize: vertical;"></textarea>
                    </div>
                </fieldset>

                <button type="submit" style="width: 100%; background-color: #ff6200; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px;">Confirmar Pedido</button>
            </form>
        </section>
    </main>

    <footer style="background-color: #1e1e1e; text-align: center; padding: 20px; border-top: 1px solid #333; margin-top: 40px;">
        <p style="margin: 0;">&copy; 2026 DarkKitchen. Proyecto Práctico de Formulario.</p>
    </footer>

</body>
</html>

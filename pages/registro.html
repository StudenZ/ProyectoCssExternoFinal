              <i class="fa-solid fa-house"></i>Inicio</a
            >

          <li>
            <a href="nosotros.html" title="Conocer más sobre DarkKitchen">
              <i class="fa-regular fa-id-badge"></i>Nosotros</a
            >
          </li>
          <li>
            <a href="servicios.html" title="Ver el menú de hamburguesas">
              <i class="fa-solid fa-bowl-food"></i>Servicios</a
            >
          </li>
          <li>
            <a href="galeria.html" title="Ver galería y promociones de DarkKitchen">
              <i class="fa-solid fa-tags"></i>Galería</a

              <i class="fa-solid fa-user"></i>Iniciar Sesión</a

        </ul>
      </nav>
    </header>

    <main>
      <section id="registro-usuario" title="Formulario de registro de usuario">
        <h2>Crear Cuenta</h2>

        <form class="formulario-acceso" action="login.html" method="post">
          <div class="campo-grupo">
            <label for="nombre">Nombre Completo:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Juan Pérez"
              title="Escribe tu nombre completo"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="email">Correo Electrónico:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="ejemplo@correo.com"
              title="Escribe tu correo electrónico"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="telefono">Teléfono:</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="555-1234-567"
              title="Escribe tu número de teléfono"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="password">Contraseña:</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Crea una contraseña"
              title="Crea una contraseña"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="confirmar_password">Confirmar Contraseña:</label>
            <input
              type="password"
              id="confirmar_password"
              name="confirmar_password"
              placeholder="Repite tu contraseña"
              title="Confirma tu contraseña"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="terminos" style="display: flex; align-items: center; cursor: pointer; gap: 8px;">
              <input type="checkbox" id="terminos" name="terminos" title="Aceptar términos y condiciones" required />
              Acepto los términos y condiciones
            </label>
          </div>

          <button class="btn-primary" type="submit" title="Crear una cuenta nueva">
            Crear Cuenta
          </button>
        </form>

        <p>
          ¿Ya tienes cuenta?
          <a href="login.html" title="Volver al inicio de sesión">Inicia sesión</a>
        </p>
      </section>
    </main>

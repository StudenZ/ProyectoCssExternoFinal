        </ul>
      </nav>
    </header>

    <main>
      <section id="registro-usuario" title="Formulario de registro de usuario">
        <h2>
          Crear Cuenta
        </h2>

        <form class="formulario-acceso" action="login.html" method="post">
          <div>
            <label
              for="nombre"
              >Nombre Completo:</label
            >
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Juan Pérez"
              title="Escribe tu nombre completo"
              required
            />
          </div>

          <div>
            <label
              for="email"
              >Correo Electrónico:</label
            >
            <input
              type="email"
              id="email"
              name="email"
              placeholder="ejemplo@correo.com"
              title="Escribe tu correo electrónico"
              required
            />
          </div>

          <div>
            <label
              for="telefono"
              >Teléfono:</label
            >
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="555-1234-567"
              title="Escribe tu número de teléfono"
              required
            />
          </div>

          <div>
            <label
              for="password"
              >Contraseña:</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Crea una contraseña"
              title="Crea una contraseña"
              required
            />
          </div>

          <div>
            <label
              for="confirmar_password"
              >Confirmar Contraseña:</label
            >
            <input
              type="password"
              id="confirmar_password"
              name="confirmar_password"
              placeholder="Repite tu contraseña"
              title="Confirma tu contraseña"
              required
            />
          </div>

          <div><label for="terminos"><input type="checkbox" id="terminos" name="terminos" title="Aceptar términos y condiciones" required /> Acepto los términos y condiciones</label></div>

          <button class="btn-acceso" type="submit" title="Crear una cuenta nueva">
            Crear Cuenta
          </button>
        </form>

        <p>
          ¿Ya tienes cuenta?
            href="login.html"
            title="Volver al inicio de sesión"
            >Inicia sesión</a
          >
        </p>
      </section>
    </main>
